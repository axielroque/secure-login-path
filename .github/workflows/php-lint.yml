name: PHP Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Display PHP version
        run: php -v

      - name: Lint PHP files
        shell: bash
        run: |
          set -eo pipefail
          mapfile -d '' files < <(find . -type f -name "*.php" -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found"
            exit 0
          fi
          # Parallel lint (4 processes)
          printf '%s\0' "${files[@]}" | xargs -0 -n1 -P 4 php -l
